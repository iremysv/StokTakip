<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Yönetim Sistemi</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-icon">📦</div>
                <h1>Stok Takip Paneli</h1>
            </div>
            <div class="header-status">
                <span class="status-indicator"></span> Canlı Envanter
            </div>
        </header>

        <!-- Main Content Grid -->
        <main class="app-content">
            <!-- Left Side: Form Controls -->
            <section class="control-panel card">
                <h2>Ürün Ekle / Güncelle</h2>
                <form id="stok-form">
                    <input type="hidden" id="edit-mode-id" value="">
                    
                    <div class="form-group">
                        <label for="urun-ad">Ürün Adı</label>
                        <input type="text" id="urun-ad" placeholder="Örn: Tabak Seti" required>
                    </div>

                    <div class="form-group">
                        <label for="urun-kategori">Kategori</label>
                        <select id="urun-kategori" required>
                            <option value="" disabled selected>Kategori Seçin...</option>
                            <option value="Mutfak Grubu">Mutfak Grubu</option>
                            <option value="Ev Tekstili">Ev Tekstili</option>
                            <option value="Züccaciye">Züccaciye</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="urun-adet">Adet</label>
                            <input type="number" id="urun-adet" min="0" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label for="urun-fiyat">Fiyat (TL)</label>
                            <input type="number" id="urun-fiyat" min="0" step="0.01" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-submit" class="btn btn-success">Kaydet</button>
                        <button type="button" id="btn-clear" class="btn btn-secondary">Temizle</button>
                    </div>
                </form>
            </section>

            <!-- Right Side: Inventory Table and Filters -->
            <section class="inventory-panel card">
                <div class="panel-header">
                    <h2>Envanter Listesi</h2>
                    
                    <!-- Filter and Search -->
                    <div class="filter-controls">
                        <input type="text" id="search-kategori" placeholder="Kategoriye göre ara...">
                        <button id="btn-filter" class="btn btn-primary">Filtrele</button>
                        <button id="btn-reset" class="btn btn-secondary">Sıfırla</button>
                    </div>
                </div>

                <!-- Table Container -->
                <div class="table-responsive">
                    <table class="inventory-table">
                        <thead>
                            <tr>
                                <th>Ürün Adı</th>
                                <th>Kategori</th>
                                <th class="text-center">Adet</th>
                                <th class="text-right">Birim Fiyat</th>
                                <th class="text-right">Toplam Değer</th>
                                <th class="text-center">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-tbody">
                            <!-- JS ile dinamik doldurulacak -->
                        </tbody>
                    </table>
                </div>

                <!-- Stats Footer -->
                <div class="inventory-stats">
                    <div class="stat-item">
                        <span class="stat-label">Toplam Ürün Çeşidi:</span>
                        <span id="stat-total-types" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Toplam Stok Miktarı:</span>
                        <span id="stat-total-quantity" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Toplam Envanter Değeri:</span>
                        <span id="stat-total-value" class="stat-value">0.00 TL</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
